version: 2
updates:
  # Library dependencies
  - package-ecosystem: nuget
    directory: /Kafka/Irkalla.Kafka
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies

  # Test project dependencies
  - package-ecosystem: nuget
    directory: /Kafka/Irkalla.Kafka.Tests
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - dependencies

  # GitHub Actions used in workflows
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    labels:
      - ci
