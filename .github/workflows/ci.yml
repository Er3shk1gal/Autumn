name: CI/CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

env:
  SOLUTION: Kafka/Irkalla.Kafka/Irkalla.Kafka.sln
  PROJECT: Kafka/Irkalla.Kafka/Irkalla.Kafka.csproj

jobs:
  build-and-test:
    name: Build & unit tests
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Restore
      run: dotnet restore $SOLUTION

    - name: Build
      run: dotnet build $SOLUTION --no-restore -c Release

    - name: Unit tests (deterministic gate)
      # Docker/Testcontainers tests run in the integration-tests job; timing-based throughput
      # asserts (Load/Auto) flake on shared runners, so run those locally only.
      run: dotnet test $SOLUTION --no-build -c Release --filter "FullyQualifiedName!~IntegrationTests&FullyQualifiedName!~LoadTests&FullyQualifiedName!~AutoConsumerTests"

  integration-tests:
    name: Integration tests (Kafka)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: Integration tests (Testcontainers spins up Kafka)
      run: dotnet test $SOLUTION -c Release --filter "FullyQualifiedName~IntegrationTests"

  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0   # full history so gitleaks scans every commit
    - name: gitleaks
      uses: gitleaks/gitleaks-action@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-scan:
    name: Dependency CVE gate (max CVSS < 6.0)
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Trivy scan (JSON)
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: fs
        scan-ref: .
        scanners: vuln
        severity: MEDIUM,HIGH,CRITICAL   # MEDIUM band (4.0-6.9) so CVSS 6.x is reported too
        ignore-unfixed: true
        format: json
        output: trivy.json
        exit-code: '0'                   # gate on the exact CVSS below, not on trivy's bands

    - name: Enforce max CVSS < 6.0
      run: |
        python3 - <<'PY'
        import json, os, sys
        data = json.load(open('trivy.json'))
        worst, worst_id, worst_pkg, count = 0.0, None, None, 0
        for res in data.get('Results') or []:
            for v in res.get('Vulnerabilities') or []:
                count += 1
                scores = []
                for c in (v.get('CVSS') or {}).values():
                    if c.get('V3Score') is not None: scores.append(c['V3Score'])
                    elif c.get('V2Score') is not None: scores.append(c['V2Score'])
                s = max(scores) if scores else 0.0
                if s > worst:
                    worst, worst_id, worst_pkg = s, v.get('VulnerabilityID'), v.get('PkgName')
        threshold = 6.0
        passed = worst < threshold
        badge = '✅ PASS' if passed else '❌ FAIL'
        summary = os.environ.get('GITHUB_STEP_SUMMARY')
        if summary:
            with open(summary, 'a') as f:
                f.write('## 🛡️ Dependency CVSS gate\n\n')
                f.write('| Metric | Value |\n|---|---|\n')
                f.write(f'| Highest CVSS | **{worst}** |\n')
                f.write(f'| Threshold | &lt; {threshold} |\n')
                f.write(f'| Vulnerabilities found | {count} |\n')
                if worst_id:
                    f.write(f'| Worst | `{worst_id}` in `{worst_pkg}` |\n')
                f.write(f'| Result | {badge} |\n')
        print(f'Highest dependency CVSS: {worst} (threshold < {threshold}) -> {badge}')
        if not passed:
            print(f'::error::{worst_id} in {worst_pkg} has CVSS {worst} (>= {threshold}) - security gate failed.')
            sys.exit(1)
        PY

  sast:
    name: SAST (Semgrep)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # upload SARIF to the code-scanning / Security tab
    steps:
    - uses: actions/checkout@v4

    - uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install Semgrep
      run: pip install semgrep

    - name: Semgrep scan (SARIF)
      # Blocks the release: --error makes a finding fail this job, and publish depends on it.
      # By-design reflection/deserialization false positives are suppressed inline with
      # `// nosemgrep: <rule-id>`.
      run: semgrep scan --config=p/csharp --config=p/security-audit --error --sarif --output=semgrep.sarif

    - name: Upload SARIF
      if: always()   # publish findings to the Security tab even when the scan failed the job
      uses: github/codeql-action/upload-sarif@v3
      with:
        sarif_file: semgrep.sarif

  publish:
    name: Publish to NuGet.org + GitHub Packages
    # Release gate — ANY of these failing blocks the publish:
    #   build-and-test    : build + unit tests
    #   integration-tests : real-Kafka integration tests
    #   secret-scan       : gitleaks (no leaked secrets)
    #   dependency-scan   : no dependency CVE with CVSS >= 6.0
    #   sast              : Semgrep (no code security findings)
    needs: [build-and-test, integration-tests, secret-scan, dependency-scan, sast]
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write   # OIDC token for NuGet Trusted Publishing
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v6
      with:
        dotnet-version: |
          8.0.x
          10.0.x

    - name: NuGet login (Trusted Publishing → short-lived key)
      uses: NuGet/login@v1
      id: nuget-login
      with:
        user: Ereshkigal

    - name: Pack
      run: dotnet pack $PROJECT -c Release -o out

    - name: Generate SBOM (CycloneDX)
      run: |
        dotnet tool install --global CycloneDX
        export PATH="$PATH:$HOME/.dotnet/tools"
        dotnet CycloneDX $PROJECT -o sbom -F Json

    - name: Install cosign
      uses: sigstore/cosign-installer@v3

    - name: Sign SBOM (keyless — Sigstore/Fulcio + Rekor)
      # Uses the job's OIDC identity (id-token: write). No keys to manage; the signature +
      # cert are recorded in the public Rekor transparency log.
      run: cosign sign-blob --yes sbom/bom.json --bundle sbom/bom.json.cosign.bundle

    - name: Upload SBOM + signature
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: sbom/*

    - name: Push to NuGet.org
      run: dotnet nuget push "out/*.nupkg" --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate

    - name: Push to GitHub Packages
      run: dotnet nuget push "out/*.nupkg" --api-key ${{ secrets.GITHUB_TOKEN }} --source https://nuget.pkg.github.com/Er3shk1gal/index.json --skip-duplicate
