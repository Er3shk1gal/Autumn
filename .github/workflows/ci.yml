name: CI/CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: |
          8.0.x
          9.0.x
        
    - name: Restore dependencies
      run: dotnet restore Kafka/Autumn.Kafka/Autumn.Kafka.sln
      
    - name: Build
      run: dotnet build Kafka/Autumn.Kafka/Autumn.Kafka.sln --no-restore -c Release
      
    - name: Test
      run: dotnet test Kafka/Autumn.Kafka/Autumn.Kafka.sln --no-build -c Release

  publish:
    needs: build-and-test
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v3
      with:
        dotnet-version: |
          8.0.x
          9.0.x
        
    - name: Pack
      run: dotnet pack Kafka/Autumn.Kafka/Autumn.Kafka.csproj -c Release -o out
      
    - name: Push to NuGet
      run: dotnet nuget push out/*.nupkg --api-key ${{ secrets.NUGET_API_KEY }} --source https://api.nuget.org/v3/index.json --skip-duplicate
